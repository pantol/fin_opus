# Realistic-cost + walk-forward configuration. All money logic is deterministic.

initial_capital: 100000.0   # PLN
seed: 42                     # reproducibility
user_id: default            # multi-tenant seam (single user for now)

costs:
  commission_bps: 38.0          # ~0.38% GPW retail per side
  commission_min: 3.0           # PLN minimum per trade
  spread_bps: 20.0              # half applied each side (buy at ask, sell at bid)
  slippage_bps: 10.0           # base slippage per side
  max_volume_participation: 0.10  # cannot trade > 10% of the day's volume
  # Liquidity-tiered spread/slippage (full-market realism): the tier with the
  # highest floor <= the instrument's POINT-IN-TIME 63-session median PLN
  # turnover (measured on the decision session) replaces the flat values.
  # Unknown/unmeasurable liquidity gets the worst (lowest-floor) tier. The
  # best tier equals the previous flat values, so blue-chip costs never got
  # optimistically cheaper than the pre-tier model; commission is never tiered.
  liquidity_tiers:
    - { min_median_turnover_pln: 20000000, spread_bps: 20.0,  slippage_bps: 10.0 }
    - { min_median_turnover_pln: 5000000,  spread_bps: 35.0,  slippage_bps: 15.0 }
    - { min_median_turnover_pln: 1000000,  spread_bps: 60.0,  slippage_bps: 25.0 }
    - { min_median_turnover_pln: 250000,   spread_bps: 120.0, slippage_bps: 40.0 }
    - { min_median_turnover_pln: 0,        spread_bps: 250.0, slippage_bps: 80.0 }

walk_forward:
  in_sample_months: 24
  out_sample_months: 6
  benchmark: wig20tr            # never SPY
  # Purged gap between each train window and its test window, in TRADING
  # SESSIONS. Must be >= the longest feature lookback (252 = ret_12m) so no
  # information leaks across the split.
  embargo_sessions: 252

# Anti-luck validation (Pack C). All deterministic code.
validation:
  mc_sims: 1000                 # random-entry Monte Carlo benchmark runs (0 = skip)
  mc_seed: 4242
  gates:
    # Acceptance requires BOTH the OOS-improvement gate AND these thresholds.
    min_dsr: 0.95               # Deflated Sharpe Ratio (probability) floor
    min_random_percentile: 0.95 # strategy Sharpe percentile vs cost-matched randomness

# Tradable universe.
#   mode: full   = EVERY non-index instrument in the DB — the whole GPW main
#                  market, dead tickers included (anti-survivorship by
#                  construction; `make ingest` keeps it fresh from the GPW
#                  session archive at zero extra requests).
#   mode: config = only config/universe.yaml instruments (legacy whitelist).
# `index`: optional point-in-time membership gate — when it names an index
# (e.g. wig20), NEW entries are only evaluated for members as of T per the
# index_membership table (`python -m app.cli refdata` loads it). null = no
# membership gate.
# `liquidity`: deterministic point-in-time ENTRY gate (exits always evaluate).
# An instrument is an entry candidate at T only if it printed a bar ON T
# (require_fresh_bar — suspended names are never entered on stale prices) and
# its 63-session median PLN turnover as of T clears the floor. Instruments
# younger than 63 sessions have no measure and fail closed (no IPO-pop buys).
universe:
  mode: full
  index: null
  liquidity:
    min_median_turnover_pln: 250000   # ~ liquid sWIG80 and up
    require_fresh_bar: true

execution:
  signal_to_fill_lag_days: 1    # decide on T close, fill on next bar (no same-bar look-ahead)

# Market-regime radar (Phase 3). Deterministic composite risk score in [-1, 1]
# computed point-in-time from the benchmark + universe breadth + materialized
# LLM verdicts (age-decayed; the LLM stays an INPUT — app/features/regime.py).
# Strategies opt in by referencing market_* features (e.g. market_risk_on);
# the effective regime config then joins their paper config fingerprint.
regime:
  trend_window: 200        # benchmark SMA anchor (sessions)
  trend_scale: 0.10        # +/-10% vs SMA maps to component +/-1
  vol_window: 20           # realized-vol window (sessions)
  vol_rank_window: 252     # percentile window for the vol component
  dd_scale: 0.20           # -20% benchmark drawdown maps to component -1
  breadth:
    stale_limit_sessions: 5   # names with no bar for longer leave the denominator
    min_names: 10             # thinner breadth reads neutral
  llm:
    half_life_sessions: 10    # verdict weight halves every 10 sessions
    max_age_sessions: 30      # verdicts older than this are fully expired
    min_count: 3              # fewer active verdicts are damped toward neutral
  weights: {trend: 0.30, breadth: 0.25, vol: 0.15, drawdown: 0.15, llm: 0.15}
  state:
    risk_on_above: 0.10      # hysteresis: ON only after score > +0.10
    risk_off_below: -0.10    # OFF only after score < -0.10
  radar:
    enabled: true            # evening state-flip Telegram card (display only)
    false_alarm:
      dd_threshold: 0.05     # a risk-off is justified by a -5% benchmark move...
      horizon_sessions: 40   # ...within 40 sessions; else it was a false alarm

# Daily paper-trading loop (`make signals`, evening after `make ingest`).
# Paper rows live under user_id 'paper:<user_id>'; costs/risk are NOT repeated
# here on purpose — the loop reads the same costs/execution/strategy config as
# the backtest, so the live track record stays comparable to backtest results.
paper:
  initial_capital: 100000.0     # PLN; the paper book starts here on first run
  max_staleness_days: 4         # refuse to decide when the latest session is older
  min_session_coverage: 0.5     # refuse when < 50% of the universe printed a bar
  catchup_max_sessions: 10      # refuse to silently churn through a bigger gap
  # universe.mode=full only: the coverage denominator counts instruments with
  # >= 1 bar in this many trailing sessions (dead/suspended names drop out of
  # the denominator instead of diluting it forever — archive-discovered
  # instruments carry no delisting metadata).
  activity_window_sessions: 15

# Realistic-cost + walk-forward configuration. All money logic is deterministic.

initial_capital: 100000.0   # PLN
seed: 42                     # reproducibility
user_id: default            # multi-tenant seam (single user for now)

costs:
  commission_bps: 38.0          # ~0.38% GPW retail per side
  commission_min: 3.0           # PLN minimum per trade
  spread_bps: 20.0              # half applied each side (buy at ask, sell at bid)
  slippage_bps: 10.0           # base slippage per side
  max_volume_participation: 0.10  # cannot trade > 10% of the day's volume

walk_forward:
  in_sample_months: 24
  out_sample_months: 6
  benchmark: wig20tr            # never SPY
  # Purged gap between each train window and its test window, in TRADING
  # SESSIONS. Must be >= the longest feature lookback (252 = ret_12m) so no
  # information leaks across the split.
  embargo_sessions: 252

# Anti-luck validation (Pack C). All deterministic code.
validation:
  mc_sims: 1000                 # random-entry Monte Carlo benchmark runs (0 = skip)
  mc_seed: 4242
  gates:
    # Acceptance requires BOTH the OOS-improvement gate AND these thresholds.
    min_dsr: 0.95               # Deflated Sharpe Ratio (probability) floor
    min_random_percentile: 0.95 # strategy Sharpe percentile vs cost-matched randomness

# Optional point-in-time universe gate. When `index` names an index (e.g.
# wig20), NEW entries are only evaluated for instruments that are members as
# of T per the index_membership table (`python -m app.cli refdata` loads it).
# null = trade the full universe.yaml list (default; membership not consulted).
universe:
  index: null

execution:
  signal_to_fill_lag_days: 1    # decide on T close, fill on next bar (no same-bar look-ahead)

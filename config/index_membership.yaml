# Point-in-time index membership (loaded into the index_membership table by
# `python -m app.cli refdata`). The backtest universe for date T = members as
# of T, so revisions must carry the REAL effective dates from GPW announcements
# (annual revision after the 3rd Friday of March, quarterly corrections in
# June/September/December, plus fast-track and corporate-event changes).
#
# This file is AUTHORITATIVE: reloading replaces each listed index's rows
# wholesale, so corrections and deletions here actually take effect in the DB.
#
# Provenance: reconstructed 2026-07-13 from Bossa's (DM BOS) archival
# point-in-time API — monthly snapshots 2015-01-02..2026-07-10, then daily
# bisection to the exact sessions: date_from = first session the instrument
# appears in the index table, date_to = last session it appears. Each entry's
# source URL returns the constituents on the entry's date_from and is the
# join-side evidence (the exit side is the same query at date_to vs the next
# session). Verified against known events: CDPROJEKT in at the 2018-03 annual
# revision, ALLEGRO fast-tracked in 2020-10 (MBANK out), MERCATOR in 2021-03 /
# out 2022-03, LOTOS out 2022-08 (Orlen merger), PGNIG out 2022-11 (same),
# ZABKA in at the 2025-03 revision.
#
# WINDOW CLAMP: members already in the index at the window start carry
# date_from = 2015-01-02 (the dataset's first session); their real join dates
# are earlier. Ranges spanning an issuer re-registration (AmRest NL->ES ISIN
# swap, 2018) are merged onto the single instrument.
#
# Delisted former members must STAY here with their real date ranges —
# removing them reintroduces survivorship bias.
#
# Fields per entry:
#   ticker     — must exist in the instruments table (curated short tickers
#                from universe.yaml, else the backfill's lowercased-ISIN ticker)
#   date_from  — first session of membership (ISO)
#   date_to    — last session of membership (ISO); omit while still a member
#   source     — point-in-time evidence for the range (Bossa archival query)


# LLM features layer (Phase 2). The LLM is ALWAYS only an INPUT to the
# deterministic risk layer (CLAUDE.md rule 1). Models/providers live HERE.
#
# Reproducibility: the provider is PINNED (order + allow_fallbacks:false) and the
# served provider/model/generation id are logged on EVERY call (CLAUDE.md rule 8).
# Cost routing: cheap model for extraction, pricier model only for synthesis.

base_url: https://openrouter.ai/api/v1

# Cheap extraction / research agent (reads filing text -> structured JSON).
extraction:
  model: openai/gpt-4o-mini
  provider:
    order: [OpenAI]
    allow_fallbacks: false
  temperature: 0.0
  max_tokens: 800

# Pricier synthesis / judge (research + quant + fundamentals -> verdict JSON).
synthesis:
  model: openai/gpt-4o
  provider:
    order: [OpenAI]
    allow_fallbacks: false
  temperature: 0.1
  max_tokens: 600

# Cache results by input hash (sha256 of model+params+prompt). A hit returns
# stored JSON with NO network call, so backtests are deterministic on replay.
cache:
  enabled: true

request_timeout_seconds: 60

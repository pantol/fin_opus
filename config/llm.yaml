# LLM features layer (Phase 2). The LLM is ALWAYS only an INPUT to the
# deterministic risk layer (CLAUDE.md rule 1). Models/providers live HERE.
#
# Reproducibility: the provider is PINNED (order + allow_fallbacks:false) and the
# served provider/model/generation id are logged on EVERY call (CLAUDE.md rule 8).
# Cost routing: cheap model for extraction, pricier model only for synthesis.

base_url: https://openrouter.ai/api/v1

# Cheap extraction / research agent (reads filing text -> structured JSON).
# DeepSeek V4 Flash, pinned to Novita (fp8, 99.3%+ uptime, $0.14/$0.28 per 1M).
# Pin notes (verified live 2026-07-23): the first-party DeepSeek endpoint is
# LISTED by the endpoints API but returns 404 "No endpoints found" on chat
# completions; the sub-$0.10 tier (Baidu et al.) sits on a congested shared
# pool (429 tpm_rate_limit_exceeded at test time).
# V4 Flash REASONS BY DEFAULT: thinking tokens bill as completion tokens and
# precede the JSON — max_tokens 2000 is headroom so the verdict does not
# truncate mid-thought (a 20-token test returned content:null, all reasoning).
extraction:
  model: deepseek/deepseek-v4-flash
  provider:
    order: [Novita]
    allow_fallbacks: false
  temperature: 0.0
  max_tokens: 2000

# Synthesis / judge (research + quant + fundamentals -> verdict JSON).
# Same DeepSeek V4 Flash as extraction (user decision 2026-07-23: flash for
# both roles) — NOTE: this abandons the cheap-extraction/pricier-judge cost
# routing; the quality evidence must come from the golden set (make eval-llm)
# once eval_labels exist. V4 Flash REASONS BY DEFAULT: thinking tokens bill
# as completion tokens, so max_tokens needs headroom well beyond the verdict
# JSON itself — too low and the answer truncates mid-thought and schema
# validation rejects it.
synthesis:
  model: deepseek/deepseek-v4-flash
  provider:
    order: [Novita]
    allow_fallbacks: false
  temperature: 0.1
  max_tokens: 3000

# Cache results by input hash (sha256 of model+params+prompt). A hit returns
# stored JSON with NO network call, so backtests are deterministic on replay.
cache:
  enabled: true

request_timeout_seconds: 60

# Per-model prices in USD per 1M tokens (openrouter.ai/models — keep current).
# Required whenever budget.monthly_usd_cap is set: without a price, cost
# tracking would undercount and the cap would never trigger.
prices:
  deepseek/deepseek-v4-flash: {input_per_1m: 0.14, output_per_1m: 0.28}

# Monthly HARD cap on LLM spend (USD, calendar month, UTC). When reached, live
# LLM calls stop (cache hits still work — they are free), the pipeline records
# the run as degraded (baseline-only) and a Telegram alert fires. null = no cap.
budget:
  monthly_usd_cap: 10.0

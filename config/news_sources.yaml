# ESPI/EBI + news collector configuration.
#
# Adding a feed = editing this file, NOT code. The collector polls every feed
# below on a schedule, captures each new filing/news item at publication time,
# and stores it append-only + idempotently into the `filings` table.
#
# ZERO LLM: this is plumbing only. The LLM (Phase 2) only READS what is stored.
#
# All enabled URLs below were VERIFIED live on 2026-07-02 (real RSS with
# <item> elements and parseable publication timestamps). Feed windows are
# short (hours, not days) — keep the poll interval tight; there is NO
# historical backfill via RSS, so history starts when the collector starts.
#
# timezone_override: bankier.pl (and gpw.pl) label Warsaw wall-clock time with
# a fixed "+0100" offset year-round, which is wrong in summer (CEST = +0200).
# The override discards the stated offset and interprets the wall-clock in the
# given zone — correct in both winter and summer. Feeds with correct offsets
# (PAP: true UTC) must NOT set it.

db_path: null                 # null -> use the main app DB (data/gpw.db)
poll_interval_minutes: 10     # scheduler interval for the --loop runner
request_timeout_seconds: 20   # per-request timeout (RSS + full-text fetch)
fetch_full_text: true         # fetch the article/filing body from each item url
user_agent: "gpw-decision-system news collector (+set-your-contact@example.com)"

feeds:
  # Bankier "Komunikaty ze spolek" — mixed ESPI (main market) + EBI
  # (NewConnect). RFC-822 pubDate with the mislabeled +0100 quirk (override).
  # Titles: "COMPANY S.A.: subject"; no report numbers / ISINs in the feed.
  - name: bankier_espi_ebi
    enabled: true
    type: null                # type detected per-item when possible
    timezone_override: Europe/Warsaw
    url: "https://www.bankier.pl/rss/espi.xml"

  # StockWatch "Komunikaty spolek" — ESPI + EBI. pubDate is a NAIVE
  # "YYYY-MM-DD HH:MM" (Warsaw local; parser interprets naive as Warsaw).
  # The link slug carries an explicit ",espi,"/",ebi," marker + PAP report id,
  # which type detection reads from the URL. Do NOT set type=ESPI/EBI query
  # params on this endpoint — they break it; leave them empty.
  - name: stockwatch_espi_ebi
    enabled: true
    type: null
    url: "https://www.stockwatch.pl/komunikaty-spolek/rss.aspx?type=&c=&t="

  # PAP Biznes — newswire + ESPI/EBI report items interleaved. Correct
  # RFC-822 UTC timestamps (no override). Report items carry the report
  # number in the title, e.g. "QUERCUS TFI S.A. (14/2026) ...". Short window
  # (~25 items / few hours).
  - name: pap_biznes
    enabled: true
    type: null
    url: "https://biznes.pap.pl/rss"

  # --- Optional extras (exchange-OPERATOR communiques, not company filings:
  # suspensions, alert list, index notices). Disabled by default; enable if
  # the strategy should react to trading suspensions. gpw.pl is WAF-sensitive
  # (needs the browser-like headers the collector already sends) and has the
  # same +0100 offset quirk.
  - name: gpw_komunikaty
    enabled: false
    type: null
    timezone_override: Europe/Warsaw
    url: "https://www.gpw.pl/rss_komunikaty"
  - name: newconnect_komunikaty
    enabled: false
    type: EBI
    timezone_override: Europe/Warsaw
    url: "https://newconnect.pl/rss_komunikaty"
